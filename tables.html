<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables</title>
</head>
<body>
  <table style="padding: 1%;" align="center" border="solid" cellspacing="1" cellpadding="10">
    <caption>Student Information Table</caption>
    <colgroup>
    <col span="3" style="background-color: lightcoral;">
    <col style="background-color: lightblue;">
    <col style="background-color: lightgreen;">
  </colgroup>
    <!-- table header -->
     <!-- th : table heading -->
    <tr>
      <th>col-1</th>
      <th>col-2</th>
      <th>col-3</th>
      <th>col-4</th>
      <th>col-5</th>
    </tr>
    

        <!-- tr: table row -->
    <tr> 
         <!-- td: table data -->
      <td rowspan="2">name</td> 
      <td>age</td>
      <td>city</td>
      <td>roll</td>
      <td>education</td>
    </tr>
    
    <tr>
      <td colspan="1">1</td>
      <td>2</td>
      <td>3</td>
      <td>4</td>
      <td>5</td>
    </tr>
      <tr>
        <td>6</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>10</td>
      </tr>
        <tr>
          <td>11</td>
          <td colspan="1">12</td>
          <td>13</td>
          <td>14</td>
          <td>15</td>
    </tr>
    
  </table>
</body>
</html>
